<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 900">
  <style>
    text { font-family: 'Segoe UI', -apple-system, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
    .title { font-size: 16px; font-weight: 600; }

    /* Light mode defaults */
    .fill-purple  { fill: #EEEDFE; stroke: #534AB7; }
    .text-purple  { fill: #3C3489; }
    .texts-purple { fill: #534AB7; }
    .fill-teal    { fill: #E1F5EE; stroke: #0F6E56; }
    .text-teal    { fill: #085041; }
    .texts-teal   { fill: #0F6E56; }
    .fill-coral   { fill: #FAECE7; stroke: #993C1D; }
    .text-coral   { fill: #712B13; }
    .texts-coral  { fill: #993C1D; }
    .fill-amber   { fill: #FAEEDA; stroke: #854F0B; }
    .text-amber   { fill: #633806; }
    .fill-blue    { fill: #E6F1FB; stroke: #185FA5; }
    .text-blue    { fill: #0C447C; }
    .texts-blue   { fill: #185FA5; }
    .fill-pink    { fill: #FBEAF0; stroke: #993556; }
    .text-pink    { fill: #72243E; }
    .texts-pink   { fill: #993556; }
    .fill-gray    { fill: #F1EFE8; stroke: #5F5E5A; }
    .text-gray    { fill: #444441; }
    .texts-gray   { fill: #5F5E5A; }
    .fill-green   { fill: #EAF3DE; stroke: #3B6D11; }
    .text-green   { fill: #27500A; }

    .arr { stroke: #888780; stroke-width: 1.5; }
    .arr-coral { stroke: #993C1D; stroke-width: 0.8; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 3 2; }
    .text-muted { fill: #888780; }

    @media (prefers-color-scheme: dark) {
      .fill-purple  { fill: #3C3489; stroke: #AFA9EC; }
      .text-purple  { fill: #CECBF6; }
      .texts-purple { fill: #AFA9EC; }
      .fill-teal    { fill: #085041; stroke: #5DCAA5; }
      .text-teal    { fill: #9FE1CB; }
      .texts-teal   { fill: #5DCAA5; }
      .fill-coral   { fill: #712B13; stroke: #F0997B; }
      .text-coral   { fill: #F5C4B3; }
      .texts-coral  { fill: #F0997B; }
      .fill-amber   { fill: #633806; stroke: #FAC775; }
      .text-amber   { fill: #FAC775; }
      .fill-blue    { fill: #0C447C; stroke: #85B7EB; }
      .text-blue    { fill: #B5D4F4; }
      .texts-blue   { fill: #85B7EB; }
      .fill-pink    { fill: #72243E; stroke: #ED93B1; }
      .text-pink    { fill: #F4C0D1; }
      .texts-pink   { fill: #ED93B1; }
      .fill-gray    { fill: #444441; stroke: #B4B2A9; }
      .text-gray    { fill: #D3D1C7; }
      .texts-gray   { fill: #B4B2A9; }
      .fill-green   { fill: #27500A; stroke: #97C459; }
      .text-green   { fill: #C0DD97; }
      .arr { stroke: #B4B2A9; }
      .arr-coral { stroke: #F0997B; }
      .leader { stroke: #5F5E5A; }
      .text-muted { fill: #B4B2A9; }
    }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title text-muted" x="340" y="28" text-anchor="middle">Platform connectivity — deployment architecture</text>
  <text class="ts text-muted" x="340" y="46" text-anchor="middle">vwan.bicep → frontdoor.bicep → operations/ (day-2)</text>

  <!-- ================================================================ -->
  <!-- vWAN outer container -->
  <!-- ================================================================ -->
  <rect class="fill-purple" x="30" y="66" width="620" height="700" rx="20" stroke-width="0.5"/>
  <text class="th text-purple" x="50" y="94">vwan.bicep</text>
  <text class="ts texts-purple" x="50" y="112">Core hub infrastructure</text>

  <!-- vWAN resource -->
  <rect class="fill-purple" x="250" y="130" width="180" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-purple" x="340" y="156" text-anchor="middle" dominant-baseline="central">vwan-platform-prod</text>

  <!-- Parent FW Policy -->
  <rect class="fill-coral" x="215" y="196" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="th text-coral" x="340" y="216" text-anchor="middle" dominant-baseline="central">azfwpolicy-platform-global</text>
  <text class="ts texts-coral" x="340" y="234" text-anchor="middle" dominant-baseline="central">Parent policy (DNS, intel, SNAT)</text>

  <!-- Arrow vWAN → parent policy -->
  <line x1="340" y1="174" x2="340" y2="194" class="arr" marker-end="url(#arrow)"/>

  <!-- ================================================================ -->
  <!-- Hub 0: eastus2 -->
  <!-- ================================================================ -->
  <rect class="fill-teal" x="50" y="280" width="280" height="300" rx="14" stroke-width="0.5"/>
  <text class="th text-teal" x="70" y="305">Hub 0 — eastus2</text>

  <!-- Hub 1: centralus -->
  <rect class="fill-teal" x="350" y="280" width="280" height="300" rx="14" stroke-width="0.5"/>
  <text class="th text-teal" x="370" y="305">Hub 1 — centralus</text>

  <!-- Inherit arrows from parent to hubs -->
  <line x1="280" y1="252" x2="190" y2="278" class="arr-coral" marker-end="url(#arrow)"/>
  <line x1="400" y1="252" x2="490" y2="278" class="arr-coral" marker-end="url(#arrow)"/>
  <text class="ts texts-coral" x="205" y="262">inherits</text>
  <text class="ts texts-coral" x="435" y="262">inherits</text>

  <!-- Hub 0 child policy -->
  <rect class="fill-coral" x="65" y="320" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-coral" x="190" y="346" text-anchor="middle" dominant-baseline="central">afwpol-platform-prod-eastus2</text>

  <!-- Hub 0 firewall -->
  <rect class="fill-amber" x="65" y="376" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-amber" x="190" y="402" text-anchor="middle" dominant-baseline="central">afw-platform-prod-eastus2</text>

  <!-- Hub 0 routing intent -->
  <rect class="fill-gray" x="65" y="432" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-gray" x="190" y="458" text-anchor="middle" dominant-baseline="central">Routing intent (inet + priv)</text>

  <!-- Hub 0 sidecar VNet -->
  <rect class="fill-blue" x="65" y="488" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="th text-blue" x="190" y="508" text-anchor="middle" dominant-baseline="central">vnet-extnet-prod-eus2-01</text>
  <text class="ts texts-blue" x="190" y="526" text-anchor="middle" dominant-baseline="central">Peered to hub 0</text>

  <!-- Hub 0 internal arrows -->
  <line x1="190" y1="364" x2="190" y2="374" class="arr" marker-end="url(#arrow)"/>
  <line x1="190" y1="420" x2="190" y2="430" class="arr" marker-end="url(#arrow)"/>
  <line x1="190" y1="476" x2="190" y2="486" class="arr" marker-end="url(#arrow)"/>

  <!-- Hub 1 child policy -->
  <rect class="fill-coral" x="365" y="320" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-coral" x="490" y="346" text-anchor="middle" dominant-baseline="central">afwpol-platform-prod-centralus</text>

  <!-- Hub 1 firewall -->
  <rect class="fill-amber" x="365" y="376" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-amber" x="490" y="402" text-anchor="middle" dominant-baseline="central">afw-platform-prod-centralus</text>

  <!-- Hub 1 routing intent -->
  <rect class="fill-gray" x="365" y="432" width="250" height="44" rx="8" stroke-width="0.5"/>
  <text class="th text-gray" x="490" y="458" text-anchor="middle" dominant-baseline="central">Routing intent (inet + priv)</text>

  <!-- Hub 1 sidecar VNet -->
  <rect class="fill-blue" x="365" y="488" width="250" height="56" rx="8" stroke-width="0.5"/>
  <text class="th text-blue" x="490" y="508" text-anchor="middle" dominant-baseline="central">vnet-extnet-prod-cus-01</text>
  <text class="ts texts-blue" x="490" y="526" text-anchor="middle" dominant-baseline="central">Peered to hub 1</text>

  <!-- Hub 1 internal arrows -->
  <line x1="490" y1="364" x2="490" y2="374" class="arr" marker-end="url(#arrow)"/>
  <line x1="490" y1="420" x2="490" y2="430" class="arr" marker-end="url(#arrow)"/>
  <line x1="490" y1="476" x2="490" y2="486" class="arr" marker-end="url(#arrow)"/>

  <!-- DDoS note -->
  <text class="ts text-muted" x="340" y="608" text-anchor="middle">DDoS protection plan: optional (parDdosEnabled, default true)</text>

  <!-- ================================================================ -->
  <!-- Front Door -->
  <!-- ================================================================ -->
  <rect class="fill-pink" x="30" y="636" width="300" height="120" rx="14" stroke-width="0.5"/>
  <text class="th text-pink" x="50" y="661">frontdoor.bicep</text>
  <text class="ts texts-pink" x="50" y="679">Separate module, parallel deploy</text>

  <rect class="fill-pink" x="45" y="693" width="270" height="50" rx="8" stroke-width="0.5"/>
  <text class="th text-pink" x="180" y="712" text-anchor="middle" dominant-baseline="central">AFD Premium + WAF</text>
  <text class="ts texts-pink" x="180" y="730" text-anchor="middle" dominant-baseline="central">Private Link origin → ILB</text>

  <!-- ================================================================ -->
  <!-- Operations -->
  <!-- ================================================================ -->
  <rect class="fill-gray" x="350" y="636" width="300" height="120" rx="14" stroke-width="0.5"/>
  <text class="th text-gray" x="370" y="661">operations/ (day-2)</text>
  <text class="ts texts-gray" x="370" y="679">Deploy when ready, per-hub</text>

  <rect class="fill-gray" x="365" y="693" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th text-gray" x="430" y="718" text-anchor="middle" dominant-baseline="central">VPN GW</text>

  <rect class="fill-gray" x="505" y="693" width="130" height="50" rx="8" stroke-width="0.5"/>
  <text class="th text-gray" x="570" y="718" text-anchor="middle" dominant-baseline="central">ER GW</text>

  <!-- ================================================================ -->
  <!-- Deployment order -->
  <!-- ================================================================ -->
  <text class="th text-muted" x="340" y="808" text-anchor="middle">Deployment order</text>

  <rect class="fill-purple" x="50" y="826" width="170" height="36" rx="8" stroke-width="0.5"/>
  <text class="th text-purple" x="135" y="844" text-anchor="middle" dominant-baseline="central">1. vwan.bicep</text>

  <rect class="fill-pink" x="255" y="826" width="170" height="36" rx="8" stroke-width="0.5"/>
  <text class="th text-pink" x="340" y="844" text-anchor="middle" dominant-baseline="central">2. frontdoor.bicep</text>

  <rect class="fill-gray" x="460" y="826" width="170" height="36" rx="8" stroke-width="0.5"/>
  <text class="th text-gray" x="545" y="844" text-anchor="middle" dominant-baseline="central">3. operations/</text>

  <line x1="222" y1="844" x2="253" y2="844" class="arr" marker-end="url(#arrow)"/>
  <line x1="427" y1="844" x2="458" y2="844" class="arr" marker-end="url(#arrow)"/>
  <text class="ts text-muted" x="237" y="836">parallel</text>
  <text class="ts text-muted" x="445" y="836">later</text>

  <text class="ts text-muted" x="340" y="884" text-anchor="middle">Steps 1 and 2 can run in parallel. Step 3 is deployed per-hub when gateways are needed.</text>
</svg>
